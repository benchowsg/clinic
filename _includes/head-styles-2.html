<style>
    /* 1. BRAND VARIABLES */
    :root {
        --brand-blue: #43a7d5;
        --brand-dark: #2c4964;
        --brand-bg: #f8fafc;
        --brand-border: #e2e8f0;
        --text-muted: #64748b;
        --bento-radius: 32px; /* The Nev Flynn "Roundness" */
    }

    /* 2. CORE RESET & FONTS */
    body { font-family: 'Inter', sans-serif; color: #334155; overflow-x: hidden; }
    
    /* 3. NAVIGATION & HERO */
    .navbar { background: #fff; border-bottom: 1px solid var(--brand-border); }
    .btn-book { background: var(--brand-blue); color: #fff !important; font-weight: 700; border-radius: 12px; padding: 10px 24px !important; }
    #hero { padding: 100px 0 60px; background: radial-gradient(circle at top right, #f0f9ff 0%, #fff 100%); }
    .hero-h1 { font-size: 3.5rem; font-weight: 800; color: var(--brand-dark); line-height: 1.1; letter-spacing: -2px; }

    /* 4. THE BENTO SYSTEM (NEV FLYNN STYLE) */
    .bento-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr); /* 3 columns on desktop */
        grid-auto-rows: minmax(180px, auto);
        gap: 24px;
        padding: 40px 0;
    }

    .bento-card {
        background: #fff;
        border: 1px solid var(--brand-border);
        border-radius: var(--bento-radius);
        padding: 35px;
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        text-decoration: none !important;
        color: inherit !important;
    }

    .bento-card:hover {
        transform: scale(1.02);
        box-shadow: 0 20px 40px rgba(0,0,0,0.06);
        border-color: var(--brand-blue);
    }

    /* Sizing for the "Mixed" Look */
    .span-2 { grid-column: span 2; }
    .span-1 { grid-column: span 1; }

    /* 5. CONVERSION STYLES */
    .card-badge { display: inline-block; padding: 4px 12px; border-radius: 100px; font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 15px; }
    .urgent-accent { border-left: 8px solid #ef4444 !important; }

    /* 6. EXPERTISE TRAY & FOOTER */
    .expertise-tray { padding: 60px 0; background: var(--brand-bg); border-top: 1px solid var(--brand-border); }
    .expertise-column h6 { font-size: 0.75rem; font-weight: 800; color: var(--brand-blue); margin-bottom: 15px; text-transform: uppercase; }
    .expertise-list { list-style: none; padding: 0; font-size: 0.9rem; }
    .expertise-list a { text-decoration: none; color: var(--text-muted); transition: 0.2s; }
    .expertise-list a:hover { color: var(--brand-blue); }

    /* 7. MOBILE ADJUSTMENTS */
    @media (max-width: 991px) {
        .bento-container { grid-template-columns: 1fr; }
        .span-2 { grid-column: span 1; }
        .hero-h1 { font-size: 2.5rem; text-align: center; }
    }
</style>
